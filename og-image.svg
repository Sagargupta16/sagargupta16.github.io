<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="rgba(88,60,180,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="100%" r="60%">
      <stop offset="0%" stop-color="rgba(60,100,220,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b0a0ff"/>
      <stop offset="100%" stop-color="#7c5ce7"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Glass card -->
  <rect x="240" y="140" width="720" height="350" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Text -->
  <text x="600" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#f0f0f8" text-anchor="middle" letter-spacing="-2">Sagar Gupta</text>
  <!-- Divider -->
  <rect x="552" y="305" width="96" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="600" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" fill="rgba(220,220,235,0.6)" text-anchor="middle">Software Developer &amp; Engineer</text>
  <!-- URL -->
  <text x="600" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="rgba(160,140,255,0.5)" text-anchor="middle">sagargupta.online</text>
</svg>
