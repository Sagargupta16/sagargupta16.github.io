<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page Not Found - Sagar Gupta's Portfolio">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://scripts.simpleanalyticscdn.com; img-src 'self' https://queue.simpleanalyticscdn.com; style-src 'self' 'unsafe-inline'; connect-src https://simpleanalyticscdn.com">

  <title>404 - Page Not Found | Sagar Gupta</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <div class="error-code" aria-hidden="true">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist. You'll be redirected to my portfolio, or you can click one of the buttons below:</p>
    <a href="https://sagargupta.online/portfolio-react/" class="btn">Visit Portfolio</a>
    <a href="https://sagargupta.online/" class="btn">Go Home</a>

    <div class="loading" aria-live="polite">
      <output class="spinner" aria-label="Loading"></output>
      Redirecting in a few seconds...
    </div>
  </main>

  <script src="/redirect.js"></script>
  <script>scheduleRedirect(5);</script>

  <!-- Privacy-first analytics -->
  <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
</body>
</html>
